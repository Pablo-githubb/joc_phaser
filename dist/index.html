<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- SEO: Títol i descripció del joc -->
  <title>Shadow Heist — Joc de Sigil 2D</title>
  <meta name="description" content="Shadow Heist: Un emocionant joc 2D de sigil i robatori. Infiltra't en edificis, evita guardes i càmeres, i roba el botí!" />
  <meta name="keywords" content="joc, stealth, phaser, 2D, robatori, sigil" />
  <meta name="author" content="Shadow Heist Team" />
  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
  <!-- Google Font per a la UI del joc -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    /* Estils globals per centrar el canvas del joc */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0a12;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
      font-family: 'Outfit', sans-serif;
    }

    /* Contenidor del joc amb ombra i bordes arrodonits */
    #game-container {
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 0 40px rgba(100, 140, 255, 0.15),
                  0 0 80px rgba(100, 140, 255, 0.05);
    }

    /* Pantalla de càrrega inicial (abans que Phaser arrenqui) */
    #loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #0a0a12;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      transition: opacity 0.5s ease;
    }

    #loading-screen h1 {
      font-family: 'Press Start 2P', cursive;
      color: #64b5f6;
      font-size: 1.2rem;
      margin-bottom: 20px;
      text-shadow: 0 0 10px rgba(100, 181, 246, 0.5);
    }

    .loading-dots span {
      color: #64b5f6;
      font-size: 2rem;
      animation: blink 1.4s infinite;
    }

    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes blink {
      0%, 20% { opacity: 0; }
      50% { opacity: 1; }
      100% { opacity: 0; }
    }
  </style>
  <script type="module" crossorigin src="./js/index-BlzvAh2p.js"></script>
</head>
<body>
  <!-- Pantalla de càrrega HTML (es mostra mentre Phaser carrega) -->
  <div id="loading-screen">
    <h1>SHADOW HEIST</h1>
    <div class="loading-dots">
      <span>.</span><span>.</span><span>.</span>
    </div>
  </div>

  <!-- Contenidor on Phaser renderitzarà el canvas del joc -->
  <div id="game-container"></div>

  <!-- Punt d'entrada del joc -->
</body>
</html>
